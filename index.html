<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1410">
<title>BrewLog</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#1a1410;color:#ede4da;font-family:'Georgia','Hiragino Mincho ProN','Yu Mincho',serif}
input::placeholder,textarea::placeholder{color:rgba(200,149,108,0.3)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(200,149,108,0.2);border-radius:2px}
select option{background:#2a2118;color:#ede4da}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,80,80,0.4)}50%{box-shadow:0 0 0 8px rgba(220,80,80,0)}}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#c8956c;border:3px solid #1a1410;box-shadow:0 2px 6px rgba(0,0,0,0.4);cursor:pointer}
input[type="range"]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#c8956c;border:3px solid #1a1410;box-shadow:0 2px 6px rgba(0,0,0,0.4);cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const STORAGE_KEY="brewlog_records",BEANS_KEY="brewlog_beans_v3",EQUIP_KEY="brewlog_equip";
const loadData=(key,fb=[])=>{try{const r=localStorage.getItem(key);return r?JSON.parse(r):fb}catch{return fb}};
const saveData=(key,d)=>{try{localStorage.setItem(key,JSON.stringify(d))}catch{}};

const GRINDERS={"fellow_opus":{name:"Fellow Opus",min:1,max:11,step:0.25,unit:"",default:5,label:"設定値"},"timemore_xlite":{name:"Timemore X Lite",min:3,max:24,step:0.5,unit:"",default:14,label:"クリック"},"comandante_c40":{name:"Comandante C40",min:0,max:45,step:1,unit:"clicks",default:25,label:"クリック"},"other":{name:"その他",min:1,max:40,step:1,unit:"",default:15,label:"設定値"}};
const DRIPPERS=["Hario V60","Origami","OREA","Kalita Wave","Chemex","AeroPress","French Press","Clever","その他"];
const TEMP_OPTIONS=[80,82,84,85,86,87,88,89,90,91,92,93,94,95,96,97,98,100];
const DOSE_OPTIONS=[10,12,13,14,15,16,17,18,19,20,22,24,25,30];
const WATER_OPTIONS=[150,180,200,220,225,230,240,250,260,270,280,300,350,400,500];
const PROCESS_OPTIONS=["Washed","Natural","Honey","Anaerobic","Carbonic Maceration","Wet Hulled","Other"];

const DEFAULT_BREW={beanId:"",grinderId:"fellow_opus",dripper:"Hario V60",grind:5,temp:93,dose:15,water:250,brewTimeMin:3,brewTimeSec:0,pours:[],overall:3,acidity:0,sweetness:0,bitterness:0,body:0,note:""};
const DEFAULT_BEAN={id:"",name:"",country:"",farm:"",altitude:"",process:""};
const DEFAULT_EQUIP={grinderId:"fellow_opus",dripper:"Hario V60"};

const TASTE_LABELS=[{key:"acidity",label:"酸味",emoji:"🍋"},{key:"sweetness",label:"甘味",emoji:"🍯"},{key:"bitterness",label:"苦味",emoji:"🫘"},{key:"body",label:"濃度感",emoji:"☕"}];
const COUNTRY_FLAGS={"エチオピア":"🇪🇹","ケニア":"🇰🇪","コロンビア":"🇨🇴","ブラジル":"🇧🇷","グアテマラ":"🇬🇹","コスタリカ":"🇨🇷","パナマ":"🇵🇦","インドネシア":"🇮🇩","ルワンダ":"🇷🇼","タンザニア":"🇹🇿","ホンジュラス":"🇭🇳","ペルー":"🇵🇪","メキシコ":"🇲🇽","イエメン":"🇾🇪","ニカラグア":"🇳🇮","ボリビア":"🇧🇴","エルサルバドル":"🇸🇻","中国":"🇨🇳","インド":"🇮🇳","ベトナム":"🇻🇳"};

function getBeanDisplayName(b){if(b.name?.trim())return b.name;const p=[];if(b.country)p.push(b.country);if(b.farm)p.push(b.farm);if(b.process)p.push(`(${b.process})`);return p.length>0?p.join(" / "):"（名称未設定）";}
function getBeanFlag(b){return COUNTRY_FLAGS[b.country]||(b.country?"🌍":"");}
function formatDate(iso){const d=new Date(iso);return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`;}

function useVoiceInput(onResult){const[listening,setListening]=useState(false);const ref=useRef(null);const toggle=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("音声入力非対応");return;}if(listening&&ref.current){ref.current.stop();setListening(false);return;}const r=new SR();r.lang="ja-JP";r.continuous=false;r.interimResults=false;r.onresult=(e)=>{onResult(e.results[0][0].transcript);setListening(false);};r.onerror=()=>setListening(false);r.onend=()=>setListening(false);ref.current=r;r.start();setListening(true);};return{listening,toggle};}
function VoiceButton({listening,onToggle,size=42}){return <button type="button" onClick={onToggle} style={{background:listening?"rgba(220,80,80,0.3)":"rgba(200,149,108,0.15)",border:`1px solid ${listening?"rgba(220,80,80,0.5)":"rgba(200,149,108,0.2)"}`,borderRadius:10,width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,flexShrink:0,transition:"all 0.2s",animation:listening?"pulse 1s infinite":"none"}}>{listening?"⏹":"🎙"}</button>;}

function Dropdown({label,unit,value,onChange,options}){return <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:12,color:"#8a7b6e",letterSpacing:0.5}}>{label}</label><div style={{position:"relative"}}><select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",appearance:"none",WebkitAppearance:"none",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(200,149,108,0.2)",borderRadius:10,padding:"10px 32px 10px 12px",color:"#ede4da",fontSize:16,outline:"none",cursor:"pointer",fontFamily:"inherit"}}>{options.map(o=><option key={o} value={o} style={{background:"#2a2118",color:"#ede4da"}}>{o===""?"—":`${o}${unit||""}`}</option>)}</select><span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:"#8a7b6e",fontSize:12,pointerEvents:"none"}}>▼</span></div></div>;}
function SmallInput({label,value,onChange,placeholder,inputMode}){return <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:11,color:"#6b5a4e",letterSpacing:0.5}}>{label}</label><input type="text" inputMode={inputMode} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(200,149,108,0.15)",borderRadius:8,padding:"8px 10px",color:"#ede4da",fontSize:14,outline:"none",fontFamily:"inherit"}} onFocus={e=>e.target.style.borderColor="rgba(200,149,108,0.4)"} onBlur={e=>e.target.style.borderColor="rgba(200,149,108,0.15)"}/></div>;}
function ChipSelect({label,options,value,onChange}){return <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:12,color:"#8a7b6e",letterSpacing:0.5}}>{label}</label><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{options.map(o=><button key={o} type="button" onClick={()=>onChange(value===o?"":o)} style={{background:value===o?"rgba(200,149,108,0.3)":"rgba(200,149,108,0.08)",border:`1px solid ${value===o?"rgba(200,149,108,0.5)":"rgba(200,149,108,0.12)"}`,borderRadius:8,padding:"6px 12px",color:value===o?"#ede4da":"#8a7b6e",fontSize:13,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>{o}</button>)}</div></div>;}

function GrindSlider({value,onChange,grinder}){const g=GRINDERS[grinder]||GRINDERS.fellow_opus;const pct=((value-g.min)/(g.max-g.min))*100;const displayVal=g.step<1?value.toFixed(g.step===0.25?2:1):value.toString();return <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:12,color:"#8a7b6e",letterSpacing:0.5}}>挽き目（{g.name}）</label><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:22,fontWeight:700,color:"#c8956c",minWidth:48,textAlign:"center",fontFamily:"'Cormorant Garamond', Georgia, serif"}}>{displayVal}</span><div style={{flex:1,position:"relative",padding:"8px 0"}}><div style={{position:"absolute",top:"50%",left:0,right:0,height:4,background:"rgba(200,149,108,0.15)",borderRadius:2,transform:"translateY(-50%)"}}/><div style={{position:"absolute",top:"50%",left:0,width:`${pct}%`,height:4,background:"linear-gradient(90deg, #c8956c, #a07050)",borderRadius:2,transform:"translateY(-50%)"}}/><input type="range" min={g.min} max={g.max} step={g.step} value={value} onChange={e=>onChange(parseFloat(e.target.value))} style={{width:"100%",position:"relative",zIndex:2,WebkitAppearance:"none",appearance:"none",background:"transparent",cursor:"pointer",height:20}}/></div></div><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#6b5a4e",padding:"0 4px"}}><span>細 ← {g.min}</span><span>{g.max} → 粗</span></div></div>;}

function StarRow({value,onChange}){return <div style={{display:"flex",gap:4,cursor:"pointer"}}>{[1,2,3,4,5].map(i=><button key={i} type="button" onClick={()=>onChange(i)} style={{background:"none",border:"none",fontSize:30,padding:2,cursor:"pointer",transition:"opacity 0.15s, transform 0.15s",opacity:i<=value?1:0.25,transform:i<=value?"scale(1.1)":"scale(0.9)",color:"#c8956c"}}>★</button>)}</div>;}
function TasteSlider({label,emoji,value,onChange}){return <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:14,color:"#b8a590",width:70,display:"flex",alignItems:"center",gap:4}}><span>{emoji}</span> {label}</span><div style={{display:"flex",gap:3,flex:1}}>{[1,2,3,4,5].map(v=><button key={v} type="button" onClick={()=>onChange(value===v?0:v)} style={{flex:1,height:28,border:"none",borderRadius:6,background:v<=value?"#c8956c":"rgba(200,149,108,0.15)",cursor:"pointer",transition:"all 0.15s",fontSize:11,color:v<=value?"#1a1410":"#6b5a4e",fontWeight:v<=value?700:400}}>{v}</button>)}</div></div>;}

const RADAR_AXES=[{key:"overall",label:"おいしさ"},{key:"acidity",label:"酸味"},{key:"sweetness",label:"甘味"},{key:"bitterness",label:"苦味"},{key:"body",label:"濃度感"}];
function RadarChart({data,size=180}){const cx=size/2,cy=size/2,r=size/2-28,levels=5,n=RADAR_AXES.length,step=(2*Math.PI)/n,start=-Math.PI/2;const pt=(i,v)=>{const a=start+i*step;const d=(v/levels)*r;return{x:cx+d*Math.cos(a),y:cy+d*Math.sin(a)};};const grids=[];for(let l=1;l<=levels;l++){const ps=Array.from({length:n},(_,i)=>pt(i,l));grids.push(ps.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ")+" Z");}const dp=RADAR_AXES.map((a,i)=>pt(i,data[a.key]||0));const dPath=dp.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ")+" Z";const lp=Array.from({length:n},(_,i)=>{const a=start+i*step;const d=r+18;return{x:cx+d*Math.cos(a),y:cy+d*Math.sin(a)};});return <div style={{display:"flex",justifyContent:"center",padding:"4px 0"}}><svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{grids.map((d,i)=><path key={i} d={d} fill="none" stroke="rgba(200,149,108,0.12)" strokeWidth={i===levels-1?1:0.5}/>)}{Array.from({length:n},(_,i)=>pt(i,levels)).map((p,i)=><line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(200,149,108,0.1)" strokeWidth={0.5}/>)}<path d={dPath} fill="rgba(200,149,108,0.2)" stroke="#c8956c" strokeWidth={1.5}/>{dp.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={3} fill="#c8956c"/>)}{lp.map((p,i)=><text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" style={{fontSize:10,fill:"#8a7b6e",fontFamily:"inherit"}}>{RADAR_AXES[i].label}</text>)}</svg></div>;}

function AIPromptHelper({onParsed}){const[open,setOpen]=useState(false);const[copied,setCopied]=useState(null);const[paste,setPaste]=useState("");const[result,setResult]=useState(null);const prompts=[{id:"photo",label:"📸 パッケージ写真から",text:"この画像はコーヒー豆のパッケージです。以下の情報を読み取って、それぞれ改行して教えてください。\n\n・豆の名前\n・生産国\n・農園名\n・標高\n・精製方法（Washed / Natural / Honey / Anaerobic / Carbonic Maceration / Wet Hulled / Other）"},{id:"url",label:"🔗 商品URLから",text:"以下のURLのコーヒー豆の情報を読み取って、それぞれ改行して教えてください。\n\nURL: （ここにURLを貼る）\n\n・豆の名前\n・生産国\n・農園名\n・標高\n・精製方法（Washed / Natural / Honey / Anaerobic / Carbonic Maceration / Wet Hulled / Other）"},{id:"name",label:"☕ 豆の名前から",text:"以下のコーヒー豆について、わかる範囲で情報を教えてください。\n\n豆の名前: （ここに豆の名前を入力）\n\n・生産国\n・農園名\n・標高\n・精製方法（Washed / Natural / Honey / Anaerobic / Carbonic Maceration / Wet Hulled / Other）"}];const PM=["Washed","Natural","Honey","Anaerobic","Carbonic Maceration","Wet Hulled","Other"];const copy=async(p)=>{try{await navigator.clipboard.writeText(p.text)}catch{const t=document.createElement("textarea");t.value=p.text;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}setCopied(p.id);setTimeout(()=>setCopied(null),2000);};const parse=()=>{if(!paste.trim())return;const res={name:"",country:"",farm:"",altitude:"",process:""};const lines=paste.split("\n").map(l=>l.replace(/^[・\-\*•]\s*/,"").trim()).filter(Boolean);for(const line of lines){const lo=line.toLowerCase();const val=line.replace(/^[^:：]+[:：]\s*/,"").trim();if(!val||val==="—"||val==="-"||val==="不明"||val==="なし"||val==="N/A")continue;if(lo.match(/豆の名前|豆名|名前|name/))res.name=val;else if(lo.match(/生産国|国|country|origin/))res.country=val;else if(lo.match(/農園|ファーム|farm|estate|農協|ステーション/))res.farm=val;else if(lo.match(/標高|altitude|elevation|masl/)){const n=val.replace(/[^\d]/g,"");if(n)res.altitude=n;}else if(lo.match(/精製|プロセス|process|processing/)){const m=PM.find(p=>val.toLowerCase().includes(p.toLowerCase()));res.process=m||val;}}setResult(res);};const apply=()=>{if(result){onParsed(result);setPaste("");setResult(null);}};
return <div style={{display:"flex",flexDirection:"column",gap:6}}><button type="button" onClick={()=>setOpen(!open)} style={{background:"none",border:"1px solid rgba(120,140,200,0.2)",borderRadius:10,padding:"9px 14px",color:"#8a9bc0",fontSize:12,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>✨</span>{open?"AIで入力を楽にする ▾":"AIで入力を楽にする ▸"}</button>{open&&<div style={{background:"rgba(120,140,200,0.05)",border:"1px solid rgba(120,140,200,0.12)",borderRadius:10,padding:12,display:"flex",flexDirection:"column",gap:10,animation:"fadeIn 0.2s ease"}}><div style={{display:"flex",flexDirection:"column",gap:6}}><p style={{fontSize:12,color:"#8a9bc0",margin:0,fontWeight:600}}>① プロンプトをコピー</p>{prompts.map(p=><button key={p.id} type="button" onClick={()=>copy(p)} style={{background:copied===p.id?"rgba(100,180,120,0.15)":"rgba(120,140,200,0.08)",border:`1px solid ${copied===p.id?"rgba(100,180,120,0.3)":"rgba(120,140,200,0.15)"}`,borderRadius:8,padding:"10px 12px",color:copied===p.id?"#8ac090":"#a0b0d0",fontSize:13,cursor:"pointer",textAlign:"left",fontFamily:"inherit",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{p.label}</span><span style={{fontSize:11,opacity:0.7}}>{copied===p.id?"✓ コピー済":"コピー"}</span></button>)}</div><div style={{display:"flex",flexDirection:"column",gap:6,borderTop:"1px solid rgba(120,140,200,0.1)",paddingTop:10}}><p style={{fontSize:12,color:"#8a9bc0",margin:0,fontWeight:600}}>② AIの回答を貼り付け</p><textarea value={paste} onChange={e=>{setPaste(e.target.value);setResult(null);}} placeholder="AIの回答をそのまま貼り付け" rows={4} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(120,140,200,0.2)",borderRadius:8,padding:"10px 12px",color:"#ede4da",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",lineHeight:1.6}}/>{paste.trim()&&!result&&<button type="button" onClick={parse} style={{background:"rgba(120,140,200,0.15)",border:"1px solid rgba(120,140,200,0.3)",borderRadius:8,padding:"8px 14px",color:"#a0b0d0",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>読み取る</button>}</div>{result&&<div style={{display:"flex",flexDirection:"column",gap:6,borderTop:"1px solid rgba(120,140,200,0.1)",paddingTop:10,animation:"fadeIn 0.2s ease"}}><p style={{fontSize:12,color:"#8a9bc0",margin:0,fontWeight:600}}>③ 確認して反映</p><div style={{background:"rgba(200,149,108,0.06)",borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:4}}>{result.name&&<div style={{fontSize:13,color:"#b8a590"}}>📝 名前: <span style={{color:"#ede4da"}}>{result.name}</span></div>}{result.country&&<div style={{fontSize:13,color:"#b8a590"}}>🌍 国: <span style={{color:"#ede4da"}}>{result.country}</span></div>}{result.farm&&<div style={{fontSize:13,color:"#b8a590"}}>🏔 農園: <span style={{color:"#ede4da"}}>{result.farm}</span></div>}{result.altitude&&<div style={{fontSize:13,color:"#b8a590"}}>📐 標高: <span style={{color:"#ede4da"}}>{result.altitude}m</span></div>}{result.process&&<div style={{fontSize:13,color:"#b8a590"}}>⚙️ 精製: <span style={{color:"#ede4da"}}>{result.process}</span></div>}</div><div style={{display:"flex",gap:6}}><button type="button" onClick={apply} style={{flex:1,background:"rgba(100,180,120,0.2)",border:"1px solid rgba(100,180,120,0.3)",borderRadius:8,padding:"8px",color:"#8ac090",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>フォームに反映</button><button type="button" onClick={()=>{setResult(null);setPaste("");}} style={{background:"none",border:"1px solid rgba(120,140,200,0.15)",borderRadius:8,padding:"8px 12px",color:"#7a8aaa",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>やり直す</button></div></div>}</div>}</div>;}

function BeanSelector({selectedId,onSelect,beans,onAddBean}){const[adding,setAdding]=useState(false);const[newBean,setNewBean]=useState({...DEFAULT_BEAN});const[showDetail,setShowDetail]=useState(false);const[showName,setShowName]=useState(false);const[viewing,setViewing]=useState(null);const nv=useVoiceInput(t=>setNewBean(p=>({...p,name:p.name+t})));const handleAdd=()=>{if(!newBean.country.trim()&&!newBean.name.trim())return;const b={...newBean,id:Date.now().toString()};onAddBean(b);onSelect(b.id);setNewBean({...DEFAULT_BEAN});setAdding(false);setShowDetail(false);setShowName(false);};const sel=beans.find(b=>b.id===selectedId);const preview=getBeanDisplayName(newBean);

function BrewCard({record,beans,onDelete}){const[expanded,setExpanded]=useState(false);const hasTaste=TASTE_LABELS.some(t=>record[t.key]>0)||record.overall>0;const bean=beans.find(b=>b.id===record.beanId);const beanName=bean?getBeanDisplayName(bean):"（豆名なし）";const flag=bean?getBeanFlag(bean):"";const grinder=GRINDERS[record.grinderId];const grinderName=grinder?grinder.name:record.grinderId;

r:"#8a7b6e",minWidth:44}}>{i===0?"蒸らし":`${i}投目`}</span><span>{p.water}g</span><span>{p.timeSec}秒</span></div>)}</div></div>}{hasTaste&&<RadarChart data={record} size={180}/>}{record.note&&<p style={{fontSize:13,color:"#9a8b7e",margin:0,lineHeight:1.5}}>{record.note}</p>}<button onClick={e=>{e.stopPropagation();onDelete(record.id);}} style={{marginTop:10,background:"none",border:"1px solid rgba(200,100,100,0.3)",borderRadius:8,padding:"6px 14px",color:"#c87070",fontSize:12,cursor:"pointer"}}>削除</button></div>}</div>;}

function BrewLog(){

  const mv=useVoiceInput(t=>setBrew(p=>({...p,note:p.note?p.note+" "+t:t})));
  useEffect(()=>{setRecords(loadData(STORAGE_KEY,[]));setBeans(loadData(BEANS_KEY,[]));const e=loadData(EQUIP_KEY,null);if(e){setEquip(e);setBrew(p=>({...p,grinderId:e.grinderId,dripper:e.dripper,grind:GRINDERS[e.grinderId]?.default||5}));}setLoaded(true);},[]);

  useEffect(()=>{if(loaded)saveData(EQUIP_KEY,equip);},[equip,loaded]);
  const updateBrew=(k,v)=>setBrew(p=>({...p,[k]:v}));
  const changeGrinder=(id)=>{const g=GRINDERS[id];setEquip(p=>({...p,grinderId:id}));setBrew(p=>({...p,grinderId:id,grind:g?.default||5}));};

  {view==="add"&&<div style={{display:"flex",flexDirection:"column",gap:18,animation:"fadeIn 0.3s ease"}}>

    {brew.dose>0&&brew.water>0&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"8px 14px",background:"rgba(200,149,108,0.08)",borderRadius:10}}><span style={{fontSize:12,color:"#8a7b6e"}}>Ratio</span><span style={{fontSize:18,fontWeight:700,color:"#c8956c",fontFamily:"'Cormorant Garamond', Georgia, serif",letterSpacing:1}}>1 : {(brew.water/brew.dose).toFixed(1)}</span></div>}

    {showPours&&<div style={{display:"flex",flexDirection:"column",gap:8,animation:"fadeIn 0.2s ease"}}>{brew.pours.map((pour,idx)=><div key={idx} style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,color:"#8a7b6e",minWidth:52,flexShrink:0}}>{idx===0?"蒸らし":`${idx}投目`}</span><div style={{position:"relative",flex:1}}><select value={pour.water} onChange={e=>{const p=[...brew.pours];p[idx]={...p[idx],water:Number(e.target.value)};updateBrew("pours",p);}} style={{width:"100%",appearance:"none",WebkitAppearance:"none",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(200,149,108,0.2)",borderRadius:8,padding:"8px 28px 8px 10px",color:"#ede4da",fontSize:14,outline:"none",cursor:"pointer",fontFamily:"inherit"}}>{[10,15,20,25,30,35,40,45,50,60,70,80,90,100,110,120,130,140,150,160,170,180,200,220,250].map(w=><option key={w} value={w} style={{background:"#2a2118",color:"#ede4da"}}>{w}g</option>)}</select><span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",color:"#6b5a4e",fontSize:10,pointerEvents:"none"}}>▼</span></div><div style={{position:"relative",flex:1}}><select value={pour.timeSec} onChange={e=>{const p=[...brew.pours];p[idx]={...p[idx],timeSec:Number(e.target.value)};updateBrew("pours",p);}} style={{width:"100%",appearance:"none",WebkitAppearance:"none",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(200,149,108,0.2)",borderRadius:8,padding:"8px 28px 8px 10px",color:"#ede4da",fontSize:14,outline:"none",cursor:"pointer",fontFamily:"inherit"}}>{[5,10,15,20,25,30,35,40,45,50,55,60,70,80,90,100,110,120].map(s=><option key={s} value={s} style={{background:"#2a2118",color:"#ede4da"}}>{s}秒</option>)}</select><span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",color:"#6b5a4e",fontSize:10,pointerEvents:"none"}}>▼</span></div><button type="button" onClick={()=>{const p=[...brew.pours];p.splice(idx,1);updateBrew("pours",p);}} style={{background:"none",border:"none",color:"#8a7b6e",fontSize:16,cursor:"pointer",padding:"4px",flexShrink:0}}>✕</button></div>)}<button type="button" onClick={()=>updateBrew("pours",[...brew.pours,{water:brew.pours.length===0?40:60,timeSec:brew.pours.length===0?30:10}])} style={{background:"none",border:"1px dashed rgba(200,149,108,0.25)",borderRadius:8,padding:"8px",color:"#8a7b6e",fontSize:12,cursor:"pointer",textAlign:"center"}}>＋ {brew.pours.length===0?"蒸らしを追加":"注湯を追加"}</button>{brew.pours.length>0&&<div style={{display:"flex",gap:12,justifyContent:"center",padding:"10px 14px",background:"rgba(200,149,108,0.08)",borderRadius:10,marginTop:4}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:10,color:"#8a7b6e"}}>合計湯量</span><span style={{fontSize:20,fontWeight:700,color:"#c8956c",fontFamily:"'Cormorant Garamond', Georgia, serif"}}>{brew.pours.reduce((s,p)=>s+p.water,0)}<span style={{fontSize:13,fontWeight:400}}>g</span></span></div><div style={{width:1,background:"rgba(200,149,108,0.15)"}}/><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:10,color:"#8a7b6e"}}>合計時間</span><span style={{fontSize:20,fontWeight:700,color:"#c8956c",fontFamily:"'Cormorant Garamond', Georgia, serif"}}>{Math.floor(brew.pours.reduce((s,p)=>s+p.timeSec,0)/60)}:{(brew.pours.reduce((s,p)=>s+p.timeSec,0)%60).toString().padStart(2,"0")}</span></div></div>}</div>}
    <div style={{display:"flex",flexDirection:"column",gap:6}}><label style={{fontSize:12,color:"#8a7b6e",letterSpacing:0.5}}>おいしさ</label><StarRow value={brew.overall} onChange={v=>updateBrew("overall",v)}/></div>
    <button type="button" onClick={()=>setShowTaste(!showTaste)} style={{background:"none",border:"1px solid rgba(200,149,108,0.15)",borderRadius:10,padding:"10px 14px",color:"#8a7b6e",fontSize:13,cursor:"pointer",textAlign:"left"}}>{showTaste?"▾ 味の詳細を閉じる":"▸ 味の詳細を記録する（任意）"}</button>
    {showTaste&&<div style={{display:"flex",flexDirection:"column",gap:10,animation:"fadeIn 0.2s ease"}}>{TASTE_LABELS.map(t=><TasteSlider key={t.key} label={t.label} emoji={t.emoji} value={brew[t.key]} onChange={v=>updateBrew(t.key,v)}/>)}</div>}
    <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:12,color:"#8a7b6e",letterSpacing:0.5}}>メモ</label><div style={{display:"flex",gap:6}}><textarea value={brew.note} onChange={e=>updateBrew("note",e.target.value)} placeholder="気づいたこと、次回試したいこと..." rows={2} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(200,149,108,0.2)",borderRadius:10,padding:"10px 12px",color:"#ede4da",fontSize:14,outline:"none",resize:"vertical",fontFamily:"inherit",lineHeight:1.6}}/><VoiceButton listening={mv.listening} onToggle={mv.toggle}/></div></div>
    <button onClick={handleSave} style={{background:"linear-gradient(135deg, #c8956c 0%, #a07050 100%)",border:"none",borderRadius:12,padding:"14px 0",color:"#1a1410",fontSize:16,fontWeight:700,cursor:"pointer",letterSpacing:1,fontFamily:"inherit"}}>記録する</button>
  </div>}

  {view==="list"&&<div style={{animation:"fadeIn 0.3s ease"}}>{records.length===0?<div style={{textAlign:"center",padding:"60px 20px",color:"#6b5a4e"}}><div style={{fontSize:40,marginBottom:16}}>☕</div><p style={{fontSize:14,lineHeight:1.8}}>まだ記録がありません。<br/>最初の一杯を記録してみましょう。</p></div>:<div style={{display:"flex",flexDirection:"column",gap:10}}><div style={{fontSize:12,color:"#6b5a4e",marginBottom:4}}>{records.length} 件の記録</div>{records.map(r=><BrewCard key={r.id} record={r} beans={beans} onDelete={handleDelete}/>)}</div>}</div>}
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<BrewLog/>);
</script>
</body>
</html>
